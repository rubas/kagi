[graph]
all-features = true

[advisories]
version = 2

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "Unicode-3.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "MPL-2.0",
  "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
