[package]
name = "kagi"
version = "0.1.1"
edition = "2024"
license = "MIT"
repository = "https://github.com/rubas/kagi"
description = "Unix-style CLI for Kagi search and URL summarization"

[[bin]]
name = "kagi-search"
path = "src/bin/kagi-search.rs"

[[bin]]
name = "kagi-summarize"
path = "src/bin/kagi-summarize.rs"

[dependencies]
clap = { version = "4.5.32", features = ["derive", "wrap_help"] }
opentelemetry = "0.31"
opentelemetry-otlp = { version = "0.31", features = ["grpc-tonic"] }
opentelemetry_sdk = { version = "0.31", features = ["rt-tokio"] }
rquest = { version = "5", features = ["cookies", "json"] }
rquest-util = "2"
scraper = "0.25"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "time"] }
tracing = "0.1"
tracing-opentelemetry = "0.32"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
assert_cmd = "2.0.16"
predicates = "3.1.3"

[profile.release]
strip = true
lto = true
opt-level = "z"
codegen-units = 1
