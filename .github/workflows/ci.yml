name: ci

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: arduino/setup-task@v2
      - run: task fmt:check
      - run: cargo install cargo-machete cargo-deny
      - run: task lint
      - run: task test
      - run: task test:release-check
      - run: task deps:machete
      - run: task deps:deny
