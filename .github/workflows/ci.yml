name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly advisory sweep so new RUSTSEC advisories against the merged
    # lockfile surface between commits.
    - cron: "17 6 * * 1"

permissions: {}

jobs:
  checks:
    name: Checks
    if: github.event_name == 'push' || github.event.pull_request.user.login == github.repository_owner
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout source
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-checks
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        # zizmor: ignore[superfluous-actions] toolchain pinned deliberately
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: latest
      - uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
      - run: task fmt:check
      - run: cargo install cargo-machete cargo-deny
      - name: Install zizmor
        shell: bash
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL https://github.com/zizmorcore/zizmor/releases/download/v1.27.0/zizmor-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C "$HOME/.local/bin" zizmor
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: task lint
      - run: task test
      - run: task test:release-check
      - run: task deps:machete
      - run: task deps:deny

  audit:
    name: Advisory audit
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout source
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-audit
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        # zizmor: ignore[superfluous-actions] toolchain pinned deliberately
        with:
          toolchain: stable
      - uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0
      - run: cargo install cargo-deny
      - run: task deps:deny
