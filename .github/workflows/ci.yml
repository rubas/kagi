name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly advisory sweep so new RUSTSEC advisories against the merged
    # lockfile surface between commits.
    - cron: "17 6 * * 1"

permissions: {}

jobs:
  checks:
    name: Checks
    if: github.event_name == 'push' || github.event.pull_request.user.login == github.repository_owner
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout source
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-checks
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # stable
        # zizmor: ignore[superfluous-actions] toolchain pinned deliberately
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: latest
      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
      - run: task fmt:check
      - run: cargo install cargo-machete cargo-deny
      - name: Install zizmor
        shell: bash
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL https://github.com/zizmorcore/zizmor/releases/download/v1.25.2/zizmor-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C "$HOME/.local/bin" zizmor
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: task lint
      - run: task test
      - run: task test:release-check
      - run: task deps:machete
      - run: task deps:deny

  audit:
    name: Advisory audit
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout source
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-audit
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # stable
        # zizmor: ignore[superfluous-actions] toolchain pinned deliberately
        with:
          toolchain: stable
      - uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
      - run: cargo install cargo-deny
      - run: task deps:deny
