name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag such as v0.1.0
        required: false
        type: string
      ref:
        description: Git ref to build from, usually refs/tags/vX.Y.Z for recovery runs
        required: false
        default: main
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      should_release: ${{ steps.prepare.outputs.should_release }}
      create_tag: ${{ steps.prepare.outputs.create_tag }}
      tag: ${{ steps.prepare.outputs.tag }}
      ref: ${{ steps.prepare.outputs.ref }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - id: prepare
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "create_tag=false" >> "$GITHUB_OUTPUT"
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          current_version="$(sed -n 's/^version = "\([^"]*\)"$/\1/p' Cargo.toml | head -n1)"
          previous_version="$(git show HEAD^:Cargo.toml 2>/dev/null | sed -n 's/^version = "\([^"]*\)"$/\1/p' | head -n1 || true)"

          if [ -z "$current_version" ] || [ "$current_version" = "$previous_version" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "create_tag=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git rev-parse -q --verify "refs/tags/v$current_version" >/dev/null; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "create_tag=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "create_tag=true" >> "$GITHUB_OUTPUT"
          echo "tag=v$current_version" >> "$GITHUB_OUTPUT"
          echo "ref=refs/tags/v$current_version" >> "$GITHUB_OUTPUT"

  tag:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.create_tag == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Create and push release tag
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag "${{ needs.prepare.outputs.tag }}"
          git push origin "${{ needs.prepare.outputs.tag }}"

  build:
    needs: [prepare, tag]
    if: needs.prepare.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archive: kagi-linux-x86_64.tar.gz
            staging: kagi-linux-x86_64
          - os: macos-latest
            archive: kagi-macos-aarch64.tar.gz
            staging: kagi-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.ref }}
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo build --release
      - name: Package release archive
        run: |
          mkdir -p "${{ matrix.staging }}/bin" \
            "${{ matrix.staging }}/skills/kagi-search" \
            "${{ matrix.staging }}/skills/kagi-summarize"
          cp target/release/kagi-search "${{ matrix.staging }}/bin/"
          cp target/release/kagi-summarize "${{ matrix.staging }}/bin/"
          cp skills/search/SKILL.md "${{ matrix.staging }}/skills/kagi-search/SKILL.md"
          cp skills/summarize/SKILL.md "${{ matrix.staging }}/skills/kagi-summarize/SKILL.md"
          tar -czf "${{ matrix.archive }}" "${{ matrix.staging }}"
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  skills:
    needs: [prepare, tag]
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.ref }}
      - name: Package skills archive
        run: |
          mkdir -p kagi-skills/kagi-search kagi-skills/kagi-summarize
          cp skills/search/SKILL.md kagi-skills/kagi-search/SKILL.md
          cp skills/summarize/SKILL.md kagi-skills/kagi-summarize/SKILL.md
          tar -czf kagi-skills.tar.gz kagi-skills
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: kagi-skills.tar.gz
          path: kagi-skills.tar.gz

  installer:
    needs: [prepare, tag]
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.ref }}
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: install.sh
          path: install.sh

  release:
    runs-on: ubuntu-latest
    needs: [prepare, build, skills, installer]
    if: needs.prepare.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Write release notes
        shell: bash
        run: |
          cp .github/release-notes.md release-notes.md
          sed -i "s/__VERSION__/${{ needs.prepare.outputs.tag }}/g" release-notes.md
      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          body_path: release-notes.md
          files: |
            dist/kagi-linux-x86_64.tar.gz
            dist/kagi-macos-aarch64.tar.gz
            dist/kagi-skills.tar.gz
            dist/install.sh
