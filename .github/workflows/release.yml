name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archive: kagi-linux-x86_64.tar.gz
            staging: kagi-linux-x86_64
          - os: macos-latest
            archive: kagi-macos-aarch64.tar.gz
            staging: kagi-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - name: Package release archive
        run: |
          mkdir -p "${{ matrix.staging }}/bin" \
            "${{ matrix.staging }}/skills/kagi-search" \
            "${{ matrix.staging }}/skills/kagi-summarize"
          cp target/release/kagi-search "${{ matrix.staging }}/bin/"
          cp target/release/kagi-summarize "${{ matrix.staging }}/bin/"
          cp skills/search/SKILL.md "${{ matrix.staging }}/skills/kagi-search/SKILL.md"
          cp skills/summarize/SKILL.md "${{ matrix.staging }}/skills/kagi-summarize/SKILL.md"
          tar -czf "${{ matrix.archive }}" "${{ matrix.staging }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package skills archive
        run: |
          mkdir -p kagi-skills/kagi-search kagi-skills/kagi-summarize
          cp skills/search/SKILL.md kagi-skills/kagi-search/SKILL.md
          cp skills/summarize/SKILL.md kagi-skills/kagi-summarize/SKILL.md
          tar -czf kagi-skills.tar.gz kagi-skills
      - uses: actions/upload-artifact@v4
        with:
          name: kagi-skills.tar.gz
          path: kagi-skills.tar.gz

  installer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: install.sh
          path: install.sh

  release:
    runs-on: ubuntu-latest
    needs: [build, skills, installer]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Write release notes
        run: |
          cat <<'EOF' > release-notes.md
          ## Install

          Installs binaries to `~/.local/bin` and skills to both `~/.agents/skills` and `~/.claude/skills`.

          ```bash
          tmp="$(mktemp -d)" && gh release download "__VERSION__" --repo "rubas/kagi" --pattern 'install.sh' --dir "$tmp" && sh "$tmp/install.sh" "__VERSION__" && rm -rf "$tmp"
          ```
          EOF
          sed -i "s/__VERSION__/${GITHUB_REF_NAME}/g" release-notes.md
      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            dist/kagi-linux-x86_64.tar.gz
            dist/kagi-macos-aarch64.tar.gz
            dist/kagi-skills.tar.gz
            dist/install.sh
