name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag such as v0.1.0
        required: false
        type: string
      ref:
        description: Git ref to build from, usually refs/tags/vX.Y.Z for recovery runs
        required: false
        default: main
        type: string

permissions: {}

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout source and inspect history
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-prepare
      cancel-in-progress: false
    outputs:
      should_release: ${{ steps.prepare.outputs.should_release }}
      create_tag: ${{ steps.prepare.outputs.create_tag }}
      tag: ${{ steps.prepare.outputs.tag }}
      ref: ${{ steps.prepare.outputs.ref }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - id: prepare
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_REF: ${{ inputs.ref }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_TAG" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "create_tag=false" >> "$GITHUB_OUTPUT"
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
            echo "ref=$INPUT_REF" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          current_version="$(sed -n 's/^version = "\([^"]*\)"$/\1/p' Cargo.toml | head -n1)"
          previous_version="$(git show HEAD^:Cargo.toml 2>/dev/null | sed -n 's/^version = "\([^"]*\)"$/\1/p' | head -n1 || true)"

          if [ -z "$current_version" ] || [ "$current_version" = "$previous_version" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "create_tag=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git rev-parse -q --verify "refs/tags/v$current_version" >/dev/null; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "create_tag=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "create_tag=true" >> "$GITHUB_OUTPUT"
          echo "tag=v$current_version" >> "$GITHUB_OUTPUT"
          echo "ref=refs/tags/v$current_version" >> "$GITHUB_OUTPUT"

  tag:
    name: Tag
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.create_tag == 'true'
    permissions:
      contents: write # push the release tag
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-tag
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        # zizmor: ignore[artipacked] credentials required to push the release tag
        with:
          fetch-depth: 0
      - name: Create and push release tag
        shell: bash
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag "$TAG"
          git push origin "$TAG"

  build:
    name: Build
    needs: [prepare, tag]
    if: ${{ !cancelled() && needs.prepare.outputs.should_release == 'true' }}
    permissions:
      contents: read # checkout source to build release archives
      id-token: write # sign build provenance attestations
      attestations: write # store build provenance attestations
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archive: kagi-linux-x86_64.tar.gz
            staging: kagi-linux-x86_64
          - os: macos-latest
            archive: kagi-macos-aarch64.tar.gz
            staging: kagi-macos-aarch64
    runs-on: ${{ matrix.os }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-build-${{ matrix.os }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # stable
        # zizmor: ignore[superfluous-actions] toolchain pinned deliberately
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo build --release
      - name: Package release archive
        env:
          STAGING: ${{ matrix.staging }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          mkdir -p "$STAGING/bin" \
            "$STAGING/skills/kagi-search" \
            "$STAGING/skills/kagi-maps" \
            "$STAGING/skills/kagi-summarize"
          cp target/release/kagi-search "$STAGING/bin/"
          cp target/release/kagi-maps "$STAGING/bin/"
          cp target/release/kagi-summarize "$STAGING/bin/"
          cp skills/search/SKILL.md "$STAGING/skills/kagi-search/SKILL.md"
          cp skills/maps/SKILL.md "$STAGING/skills/kagi-maps/SKILL.md"
          cp skills/summarize/SKILL.md "$STAGING/skills/kagi-summarize/SKILL.md"
          tar -czf "$ARCHIVE" "$STAGING"
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ matrix.archive }}
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  skills:
    name: Skills
    needs: [prepare, tag]
    if: ${{ !cancelled() && needs.prepare.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout source to package skills
      id-token: write # sign build provenance attestations
      attestations: write # store build provenance attestations
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-skills
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          persist-credentials: false
      - name: Package skills archive
        run: |
          mkdir -p kagi-skills/kagi-search kagi-skills/kagi-maps kagi-skills/kagi-summarize
          cp skills/search/SKILL.md kagi-skills/kagi-search/SKILL.md
          cp skills/maps/SKILL.md kagi-skills/kagi-maps/SKILL.md
          cp skills/summarize/SKILL.md kagi-skills/kagi-summarize/SKILL.md
          tar -czf kagi-skills.tar.gz kagi-skills
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: kagi-skills.tar.gz
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: kagi-skills.tar.gz
          path: kagi-skills.tar.gz

  installer:
    name: Installer
    needs: [prepare, tag]
    if: ${{ !cancelled() && needs.prepare.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout source to upload install.sh
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-installer
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          persist-credentials: false
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: install.sh
          path: install.sh

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [prepare, build, skills, installer]
    if: ${{ !cancelled() && needs.prepare.outputs.should_release == 'true' }}
    permissions:
      contents: write # publish the GitHub release
      attestations: read # smoke test verifies the built archives' attestations
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-release
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Smoke-test install.sh against built artifacts
        shell: bash
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          smoke_home="$(mktemp -d)"
          HOME="$smoke_home" \
            KAGI_INSTALL_BASE_URL="file://$PWD/dist" \
            sh dist/install.sh "$TAG"
          test -x "$smoke_home/.local/bin/kagi-search"
          test -x "$smoke_home/.local/bin/kagi-maps"
          test -x "$smoke_home/.local/bin/kagi-summarize"
          test -f "$smoke_home/.agents/skills/kagi-search/SKILL.md"
          test -f "$smoke_home/.claude/skills/kagi-maps/SKILL.md"
          test -f "$smoke_home/.gemini/antigravity-cli/skills/kagi-summarize/SKILL.md"
      - name: Write release notes
        shell: bash
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          cp .github/release-notes.md release-notes.md
          sed -i "s|__VERSION__|${TAG}|g" release-notes.md
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        # zizmor: ignore[superfluous-actions] pinned action kept for multi-asset release upload
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          body_path: release-notes.md
          files: |
            dist/kagi-linux-x86_64.tar.gz
            dist/kagi-macos-aarch64.tar.gz
            dist/kagi-skills.tar.gz
            dist/install.sh
