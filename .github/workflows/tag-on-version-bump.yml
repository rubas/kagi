name: tag-on-version-bump

on:
  push:
    branches:
      - main

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.current }}
      should_release: ${{ steps.version.outputs.current != steps.version.outputs.previous && steps.existing-tag.outputs.exists == 'false' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read current and previous Cargo version
        id: version
        run: |
          current_version="$(sed -n 's/^version = "\([^"]*\)"$/\1/p' Cargo.toml | head -n1)"
          previous_version="$(git show HEAD^:Cargo.toml 2>/dev/null | sed -n 's/^version = "\([^"]*\)"$/\1/p' | head -n1)"

          if [ -z "$current_version" ]; then
            echo "Failed to read current Cargo.toml version" >&2
            exit 1
          fi

          echo "current=$current_version" >> "$GITHUB_OUTPUT"
          echo "previous=$previous_version" >> "$GITHUB_OUTPUT"

      - name: Skip if version did not change
        if: steps.version.outputs.current == steps.version.outputs.previous
        run: echo "Cargo.toml version unchanged; no release created"

      - name: Check if release tag already exists
        if: steps.version.outputs.current != steps.version.outputs.previous
        id: existing-tag
        run: |
          if git rev-parse -q --verify "refs/tags/v${{ steps.version.outputs.current }}" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.version.outputs.current }} already exists; skipping release"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  tag:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create and push release tag
        env:
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag "v$VERSION"
          git push origin "v$VERSION"

  build:
    needs: [detect, tag]
    if: needs.detect.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archive: kagi-linux-x86_64.tar.gz
            staging: kagi-linux-x86_64
          - os: macos-latest
            archive: kagi-macos-aarch64.tar.gz
            staging: kagi-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - name: Package release archive
        run: |
          mkdir -p "${{ matrix.staging }}/bin" \
            "${{ matrix.staging }}/skills/kagi-search" \
            "${{ matrix.staging }}/skills/kagi-summarize"
          cp target/release/kagi-search "${{ matrix.staging }}/bin/"
          cp target/release/kagi-summarize "${{ matrix.staging }}/bin/"
          cp skills/search/SKILL.md "${{ matrix.staging }}/skills/kagi-search/SKILL.md"
          cp skills/summarize/SKILL.md "${{ matrix.staging }}/skills/kagi-summarize/SKILL.md"
          tar -czf "${{ matrix.archive }}" "${{ matrix.staging }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  skills:
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package skills archive
        run: |
          mkdir -p kagi-skills/kagi-search kagi-skills/kagi-summarize
          cp skills/search/SKILL.md kagi-skills/kagi-search/SKILL.md
          cp skills/summarize/SKILL.md kagi-skills/kagi-summarize/SKILL.md
          tar -czf kagi-skills.tar.gz kagi-skills
      - uses: actions/upload-artifact@v4
        with:
          name: kagi-skills.tar.gz
          path: kagi-skills.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: [detect, build, skills]
    if: needs.detect.outputs.should_release == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Write release notes
        env:
          VERSION: ${{ needs.detect.outputs.version }}
        run: |
          cat <<'EOF' > release-notes.md
          ## Install

          Linux x86_64:

          ```bash
          repo="rubas/kagi"; version="v__VERSION__"; tmp="$(mktemp -d)"; gh release download "$version" --repo "$repo" --pattern 'kagi-linux-x86_64.tar.gz' --dir "$tmp" && tar -xzf "$tmp/kagi-linux-x86_64.tar.gz" -C "$tmp" && install -d "$HOME/.local/bin" "$HOME/.agents/skills/kagi-search" "$HOME/.agents/skills/kagi-summarize" "$HOME/.claude/skills/kagi-search" "$HOME/.claude/skills/kagi-summarize" && install -m 755 "$tmp/kagi-linux-x86_64/bin/kagi-search" "$HOME/.local/bin/kagi-search" && install -m 755 "$tmp/kagi-linux-x86_64/bin/kagi-summarize" "$HOME/.local/bin/kagi-summarize" && install -m 644 "$tmp/kagi-linux-x86_64/skills/kagi-search/SKILL.md" "$HOME/.agents/skills/kagi-search/SKILL.md" && install -m 644 "$tmp/kagi-linux-x86_64/skills/kagi-summarize/SKILL.md" "$HOME/.agents/skills/kagi-summarize/SKILL.md" && install -m 644 "$tmp/kagi-linux-x86_64/skills/kagi-search/SKILL.md" "$HOME/.claude/skills/kagi-search/SKILL.md" && install -m 644 "$tmp/kagi-linux-x86_64/skills/kagi-summarize/SKILL.md" "$HOME/.claude/skills/kagi-summarize/SKILL.md" && rm -rf "$tmp"
          ```

          macOS arm64:

          ```bash
          repo="rubas/kagi"; version="v__VERSION__"; tmp="$(mktemp -d)"; gh release download "$version" --repo "$repo" --pattern 'kagi-macos-aarch64.tar.gz' --dir "$tmp" && tar -xzf "$tmp/kagi-macos-aarch64.tar.gz" -C "$tmp" && install -d "$HOME/.local/bin" "$HOME/.agents/skills/kagi-search" "$HOME/.agents/skills/kagi-summarize" "$HOME/.claude/skills/kagi-search" "$HOME/.claude/skills/kagi-summarize" && install -m 755 "$tmp/kagi-macos-aarch64/bin/kagi-search" "$HOME/.local/bin/kagi-search" && install -m 755 "$tmp/kagi-macos-aarch64/bin/kagi-summarize" "$HOME/.local/bin/kagi-summarize" && install -m 644 "$tmp/kagi-macos-aarch64/skills/kagi-search/SKILL.md" "$HOME/.agents/skills/kagi-search/SKILL.md" && install -m 644 "$tmp/kagi-macos-aarch64/skills/kagi-summarize/SKILL.md" "$HOME/.agents/skills/kagi-summarize/SKILL.md" && install -m 644 "$tmp/kagi-macos-aarch64/skills/kagi-search/SKILL.md" "$HOME/.claude/skills/kagi-search/SKILL.md" && install -m 644 "$tmp/kagi-macos-aarch64/skills/kagi-summarize/SKILL.md" "$HOME/.claude/skills/kagi-summarize/SKILL.md" && rm -rf "$tmp"
          ```

          Skills only:

          ```bash
          repo="rubas/kagi"; version="v__VERSION__"; tmp="$(mktemp -d)"; gh release download "$version" --repo "$repo" --pattern 'kagi-skills.tar.gz' --dir "$tmp" && tar -xzf "$tmp/kagi-skills.tar.gz" -C "$tmp" && install -d "$HOME/.agents/skills/kagi-search" "$HOME/.agents/skills/kagi-summarize" "$HOME/.claude/skills/kagi-search" "$HOME/.claude/skills/kagi-summarize" && install -m 644 "$tmp/kagi-skills/kagi-search/SKILL.md" "$HOME/.agents/skills/kagi-search/SKILL.md" && install -m 644 "$tmp/kagi-skills/kagi-summarize/SKILL.md" "$HOME/.agents/skills/kagi-summarize/SKILL.md" && install -m 644 "$tmp/kagi-skills/kagi-search/SKILL.md" "$HOME/.claude/skills/kagi-search/SKILL.md" && install -m 644 "$tmp/kagi-skills/kagi-summarize/SKILL.md" "$HOME/.claude/skills/kagi-summarize/SKILL.md" && rm -rf "$tmp"
          ```
          EOF
          sed -i "s/__VERSION__/${VERSION}/g" release-notes.md
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.detect.outputs.version }}
          body_path: release-notes.md
          files: |
            dist/kagi-linux-x86_64.tar.gz
            dist/kagi-macos-aarch64.tar.gz
            dist/kagi-skills.tar.gz
